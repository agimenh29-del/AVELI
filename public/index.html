<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AVELI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page front-minimal"></main>
    <section class="carousel-shell">
      <div class="carousel" id="carousel">
        <div class="site-nav site-nav-overlay">
          <a class="nav-logo" href="/" aria-label="go to home">
        <img src="/logo.png" alt="Brand logo" />
      </a>
        </div>
        <div class="carousel-stage" id="carouselStage">
          <p class="carousel-empty">No media uploaded yet.</p>
        </div>
        <div id="desktopOverlay" class="desktop-overlay"></div>
      </div>
    </section>
    <section class="sound-strip" hidden>
      <audio id="musicPlayer" preload="metadata"></audio>
    </section>
    <nav class="bottom-menu" aria-label="secondary">
      <a href="/#contact">contact</a>
      <a href="/admin">admin</a>
    </nav>
    <section id="contact" class="section-anchor"></section>
    <div id="productWindowTemplate" class="product-window" hidden>
      <div class="product-window-header">
        <h2 class="product-modal-title"></h2>
        <button type="button" class="product-modal-close">close</button>
      </div>
      <p class="product-modal-meta"></p>
      <div class="product-modal-media"></div>
      <a class="product-modal-buy" href="#" target="_blank" rel="noopener noreferrer">buy</a>
    </div>
    <script src="/nav.js"></script>
    <script src="/site.js"></script>
  </body>
</html>
